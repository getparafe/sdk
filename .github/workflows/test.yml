name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: SDK Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Run tests
        env:
          PARAFE_TEST_BROKER_URL: ${{ secrets.STAGING_BROKER_URL }}
          PARAFE_TEST_API_KEY: ${{ secrets.STAGING_SDK_API_KEY }}
        run: npm test
